version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dashboard-kbg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dashboard_kbg
      POSTGRES_PASSWORD: dashboard_kbg_secret
      POSTGRES_DB: dashboard_kbg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard_kbg"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
